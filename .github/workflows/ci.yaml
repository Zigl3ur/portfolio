name: CI

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Deps
        run: bun i --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format Check
        run: bun prettier . --check

      - name: Build
        run: bun run build
